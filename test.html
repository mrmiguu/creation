<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Kernel test</title></head>
  <body>
    <div id="app"></div>
    <script src="./evolve/kernel/index.js"></script>
    <script>
      (async () => {
        const k = window.EvolveKernel;
        k.log('info', 'starting test');

        // create a div
        const r1 = k.dom.create('div', { id: 'myDiv', textContent: 'hello kernel' });
        
        const nodeId = r1.value;
        // append to #app
        const q = k.dom.query('#app');
        const appId = q.value;
        if (appId) {
          k.dom.append(appId, nodeId);
        } else {
          // fallback: append directly to body
          document.body.appendChild(document.getElementById('app'));
          k.dom.append(appId, nodeId);
        }

        // callback demo
        const cb = (ev) => { k.log('info', 'event received: ' + JSON.stringify(ev)); };
        const reg = k.registerCallback(cb);
        const cbId = reg.value;
        k.dom.update(nodeId, { onclick: String(cbId) }); // attach click
      })();
    </script>
  </body>
</html>
